version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - '3001:3001'
    env_file: ./backend/.env
    depends_on: []
    restart: unless-stopped

  ml:
    build: ./ml
    ports:
      - '5000:5000'
    env_file: ./ml/.env
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - '3000:3000'
    env_file: ./web/.env
    depends_on:
      - backend
    restart: unless-stopped
