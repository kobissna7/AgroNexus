<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- AgroNexus mark — strict 3-color system: #0b2e14 / #000 / #fff -->
  <rect width="512" height="512" rx="116" fill="#0b2e14"/>
  <!-- stem -->
  <path d="M256 424 L256 240" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round"/>
  <!-- left leaf -->
  <path fill="#ffffff" d="M256 268 Q 226 162 112 150 Q 144 262 256 268 Z"/>
  <!-- right leaf -->
  <path fill="#ffffff" d="M256 216 Q 286 110 400 98 Q 368 210 256 216 Z"/>
  <!-- ground node -->
  <circle cx="256" cy="438" r="22" fill="#ffffff"/>
</svg>
