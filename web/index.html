<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png" />

    <!-- PWA / Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b2e14" />

    <!-- Apply stored theme override before first paint (avoids theme flash) -->
    <script>
      try {
        var t = localStorage.getItem('agronexus_theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>

    <!-- Fonts -->
    <link rel="preload" href="/fonts/Mulish-Variable.woff2" as="font" type="font/woff2" crossorigin />

    <!-- SEO -->
    <title>AgroNexus — Ghana's Intelligent Agricultural Marketplace</title>
    <meta name="description" content="Connect farmers, consumers, and transporters across Ghana's Western Region. AI-powered demand forecasts, real-time order tracking, and offline-ready mobile app." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AgroNexus — Ghana's Intelligent Agricultural Marketplace" />
    <meta property="og:description" content="AI-powered agricultural distribution platform for Tarkwa, Bogoso, and Prestea." />
    <meta property="og:image" content="/logo.png" />

    <!-- Leaflet map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
