name: agronexus
description: AgroNexus - Agricultural marketplace for Ghana Western Region
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # Local storage / offline cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.0.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # UI
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
